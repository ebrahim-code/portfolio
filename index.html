    <!-- Default to dark mode -->
    <script>
      (function () {
        const saved = localStorage.getItem("darkMode");
        if (saved === null || saved === "true") {
          document.documentElement.classList.add("dark");
          localStorage.setItem("darkMode", "true");
        }
      })();
    </script>
